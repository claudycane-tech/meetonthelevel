<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1b2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BuildChat" />
  <title>BuildChat</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #0d1b2a;
      --bg-1: #132236;
      --bg-2: #1a2d45;
      --bg-3: #1f3550;
      --accent: #00e5c0;
      --accent-dim: #00b89a;
      --accent-glow: rgba(0,229,192,0.12);
      --text-0: #e8f4f1;
      --text-1: #8fb8ad;
      --text-2: #5a8a7e;
      --danger: #ff6b6b;
      --warn: #ffd166;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --nav-h: 60px;
      --header-h: 56px;
    }

    html, body { height: 100%; background: var(--bg-0); color: var(--text-0); font-family: var(--font-mono); overflow: hidden; }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      position: fixed; inset: 0; background: var(--bg-0);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; z-index: 100;
    }
    #auth-screen.hidden { display: none; }

    .auth-logo {
      font-family: var(--font-head); font-size: 2.4rem; font-weight: 800;
      color: var(--accent); letter-spacing: -1px; margin-bottom: .25rem;
    }
    .auth-sub { color: var(--text-1); font-size: .8rem; margin-bottom: 3rem; letter-spacing: .05em; }

    .auth-card {
      width: 100%; max-width: 360px;
      background: var(--bg-2); border: 1px solid rgba(0,229,192,.15);
      border-radius: var(--radius); padding: 2rem;
    }
    .auth-card h2 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; }
    .auth-card p { color: var(--text-1); font-size: .8rem; line-height: 1.6; margin-bottom: 1.5rem; }

    .input-field {
      width: 100%; padding: .75rem 1rem;
      background: var(--bg-1); border: 1px solid rgba(0,229,192,.2);
      border-radius: var(--radius-sm); color: var(--text-0);
      font-family: var(--font-mono); font-size: .85rem;
      outline: none; margin-bottom: 1rem; transition: border-color .2s;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-2); }

    .btn-primary {
      width: 100%; padding: .85rem;
      background: var(--accent); color: var(--bg-0);
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-head); font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .auth-msg { margin-top: 1rem; font-size: .8rem; color: var(--text-1); text-align: center; }
    .auth-msg.success { color: var(--accent); }
    .auth-msg.error { color: var(--danger); }

    /* ── APP SHELL ── */
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
    #app.hidden { display: none; }

    /* Header */
    .app-header {
      height: var(--header-h); background: var(--bg-1);
      border-bottom: 1px solid rgba(0,229,192,.1);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; flex-shrink: 0;
    }
    .header-title { font-family: var(--font-head); font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    .header-section { font-size: .7rem; color: var(--text-1); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: .75rem; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent-glow); border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; color: var(--accent); font-family: var(--font-head);
      cursor: pointer;
    }

    /* Section tabs */
    .section-tabs {
      background: var(--bg-1); border-bottom: 1px solid rgba(0,229,192,.08);
      display: flex; overflow-x: auto; flex-shrink: 0;
      scrollbar-width: none;
    }
    .section-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: .65rem 1rem;
      font-size: .72rem; font-family: var(--font-head); font-weight: 600;
      color: var(--text-2); border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap; transition: color .2s, border-color .2s;
      letter-spacing: .03em; text-transform: uppercase;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge {
      display: inline-block; background: var(--accent); color: var(--bg-0);
      font-size: .6rem; font-weight: 700; border-radius: 99px;
      padding: 1px 5px; margin-left: 4px; vertical-align: middle;
    }

    /* Content area */
    .content-area { flex: 1; overflow: hidden; position: relative; }
    .section-view { position: absolute; inset: 0; display: none; flex-direction: column; }
    .section-view.active { display: flex; }

    /* ── CHAT SECTION ── */
    .messages-list {
      flex: 1; overflow-y: auto; padding: .75rem;
      display: flex; flex-direction: column; gap: .5rem;
      scrollbar-width: thin; scrollbar-color: var(--bg-3) transparent;
    }
    .msg-row { display: flex; gap: .5rem; align-items: flex-end; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg-3); border: 1px solid rgba(0,229,192,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 700; color: var(--text-1); font-family: var(--font-head);
    }
    .msg-bubble {
      max-width: 75%; padding: .6rem .85rem;
      border-radius: 14px 14px 14px 4px;
      background: var(--bg-2); color: var(--text-0);
      font-size: .82rem; line-height: 1.5;
      border: 1px solid rgba(255,255,255,.05);
    }
    .msg-row.mine .msg-bubble {
      background: var(--accent-glow); border-color: rgba(0,229,192,.25);
      border-radius: 14px 14px 4px 14px; color: var(--text-0);
    }
    .msg-meta { font-size: .65rem; color: var(--text-2); margin-top: 3px; }
    .msg-sender { font-size: .65rem; color: var(--accent); margin-bottom: 2px; font-weight: 600; }

    .date-divider {
      text-align: center; font-size: .65rem; color: var(--text-2);
      padding: .25rem 0; letter-spacing: .05em;
    }

    .chat-input-bar {
      padding: .6rem .75rem; background: var(--bg-1);
      border-top: 1px solid rgba(0,229,192,.08);
      display: flex; gap: .5rem; align-items: flex-end;
    }
    .chat-textarea {
      flex: 1; background: var(--bg-2); border: 1px solid rgba(0,229,192,.15);
      border-radius: 20px; padding: .6rem .9rem;
      color: var(--text-0); font-family: var(--font-mono); font-size: .83rem;
      resize: none; outline: none; max-height: 100px; line-height: 1.4;
      transition: border-color .2s;
    }
    .chat-textarea:focus { border-color: var(--accent); }
    .chat-textarea::placeholder { color: var(--text-2); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s, transform .1s;
    }
    .send-btn:active { transform: scale(.92); }
    .send-btn:hover { background: var(--accent-dim); }
    .send-btn svg { width: 16px; height: 16px; fill: var(--bg-0); }

    /* ── DECISIONS REPO ── */
    .repo-header {
      padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(0,229,192,.08);
    }
    .repo-title { font-family: var(--font-head); font-size: .9rem; font-weight: 700; color: var(--text-0); }
    .btn-add {
      padding: .4rem .85rem; background: var(--accent); color: var(--bg-0);
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-head); font-size: .75rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-add:hover { background: var(--accent-dim); }

    .decisions-list {
      flex: 1; overflow-y: auto; padding: .75rem;
      display: flex; flex-direction: column; gap: .65rem;
    }
    .decision-card {
      background: var(--bg-2); border: 1px solid rgba(0,229,192,.1);
      border-radius: var(--radius); padding: 1rem;
    }
    .decision-card.locked { border-left: 3px solid var(--accent); }
    .decision-card.proposal { border-left: 3px solid var(--warn); }
    .decision-tag {
      display: inline-block; font-size: .6rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px; margin-bottom: .5rem;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .tag-locked { background: var(--accent-glow); color: var(--accent); }
    .tag-proposal { background: rgba(255,209,102,.12); color: var(--warn); }
    .tag-cat {
      background: rgba(255,255,255,.06); color: var(--text-1);
      margin-left: 4px;
    }
    .decision-title { font-family: var(--font-head); font-size: .95rem; font-weight: 700; margin-bottom: .35rem; }
    .decision-body { font-size: .78rem; color: var(--text-1); line-height: 1.5; }
    .decision-footer { margin-top: .65rem; font-size: .65rem; color: var(--text-2); display: flex; gap: .75rem; }

    /* Proposal form modal */
    .modal-overlay {
      position: absolute; inset: 0; background: rgba(13,27,42,.9);
      display: flex; align-items: flex-end; z-index: 50;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      width: 100%; background: var(--bg-2);
      border-top: 1px solid rgba(0,229,192,.2);
      border-radius: 20px 20px 0 0; padding: 1.25rem 1rem 2rem;
    }
    .modal-sheet h3 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .form-label { font-size: .7rem; color: var(--text-1); margin-bottom: .35rem; display: block; letter-spacing: .04em; }
    .form-row { margin-bottom: .85rem; }
    .form-select {
      width: 100%; padding: .6rem .9rem;
      background: var(--bg-1); border: 1px solid rgba(0,229,192,.2);
      border-radius: var(--radius-sm); color: var(--text-0);
      font-family: var(--font-mono); font-size: .82rem; outline: none;
    }
    .modal-actions { display: flex; gap: .65rem; margin-top: 1rem; }
    .btn-cancel {
      flex: 1; padding: .75rem; background: transparent;
      border: 1px solid rgba(0,229,192,.2); border-radius: var(--radius-sm);
      color: var(--text-1); font-family: var(--font-head); font-size: .85rem;
      font-weight: 600; cursor: pointer;
    }

    /* ── ADMIN PANEL ── */
    .admin-area {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: .85rem;
    }
    .admin-section-title {
      font-family: var(--font-head); font-size: .75rem; font-weight: 700;
      color: var(--text-2); letter-spacing: .1em; text-transform: uppercase;
      padding-bottom: .5rem; border-bottom: 1px solid rgba(0,229,192,.08);
    }
    .member-row {
      background: var(--bg-2); border: 1px solid rgba(0,229,192,.08);
      border-radius: var(--radius-sm); padding: .75rem 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .member-info { flex: 1; }
    .member-name { font-size: .85rem; font-weight: 600; font-family: var(--font-head); }
    .member-email { font-size: .7rem; color: var(--text-1); }
    .member-status { font-size: .65rem; }
    .status-active { color: var(--accent); }
    .status-pending { color: var(--warn); }
    .btn-danger {
      padding: .35rem .7rem; background: transparent;
      border: 1px solid rgba(255,107,107,.3); border-radius: var(--radius-sm);
      color: var(--danger); font-family: var(--font-head); font-size: .7rem;
      font-weight: 600; cursor: pointer; transition: background .2s;
    }
    .btn-danger:hover { background: rgba(255,107,107,.1); }

    .invite-form {
      background: var(--bg-2); border: 1px solid rgba(0,229,192,.12);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .invite-form h3 { font-family: var(--font-head); font-size: .9rem; font-weight: 700; margin-bottom: 1rem; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      height: var(--nav-h); background: var(--bg-1);
      border-top: 1px solid rgba(0,229,192,.1);
      display: flex; flex-shrink: 0;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; cursor: pointer;
      color: var(--text-2); transition: color .2s; padding-bottom: 2px;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.3rem; line-height: 1; }
    .nav-label { font-size: .6rem; font-family: var(--font-head); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-2); font-size: .8rem; gap: .5rem;
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: .5rem; }

    /* Utility */
    .hidden { display: none !important; }
    .loading { opacity: .5; pointer-events: none; }

    /* Online indicator */
    .online-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); display: inline-block; margin-right: 4px;
      box-shadow: 0 0 4px var(--accent);
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">BuildChat</div>
  <div class="auth-sub">// where things get built</div>
  <div class="auth-card">
    <h2>Sign in to your workspace</h2>
    <p>Enter your email and we'll send you a magic link. No password needed.</p>
    <input id="auth-email" class="input-field" type="email" placeholder="your@email.com" autocomplete="email" />
    <button id="auth-btn" class="btn-primary">Send magic link</button>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="app-header">
    <div>
      <div class="header-title">BuildChat</div>
      <div class="header-section" id="header-section-label">General</div>
    </div>
    <div class="header-right">
      <span class="online-dot"></span>
      <span style="font-size:.7rem;color:var(--text-1)" id="online-count">0 online</span>
      <div class="avatar" id="user-avatar" title="Profile">?</div>
    </div>
  </div>

  <div class="section-tabs" id="section-tabs">
    <div class="tab active" data-section="general">General</div>
    <div class="tab" data-section="techstack">Tech Stack</div>
    <div class="tab" data-section="design">Design</div>
    <div class="tab" data-section="bugs">Bug Track</div>
    <div class="content-area" style="display:none"></div>
  </div>

  <div class="content-area">
    <!-- CHAT VIEWS (one per section) -->
    <div class="section-view active" id="view-chat-general" data-chat="general">
      <div class="messages-list" id="msgs-general"></div>
      <div class="chat-input-bar">
        <textarea class="chat-textarea" placeholder="Message general..." rows="1" data-channel="general"></textarea>
        <button class="send-btn" data-channel="general">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="section-view" id="view-chat-techstack" data-chat="techstack">
      <div class="messages-list" id="msgs-techstack"></div>
      <div class="chat-input-bar">
        <textarea class="chat-textarea" placeholder="Message tech-stack..." rows="1" data-channel="techstack"></textarea>
        <button class="send-btn" data-channel="techstack">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="section-view" id="view-chat-design" data-chat="design">
      <div class="messages-list" id="msgs-design"></div>
      <div class="chat-input-bar">
        <textarea class="chat-textarea" placeholder="Message design..." rows="1" data-channel="design"></textarea>
        <button class="send-btn" data-channel="design">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="section-view" id="view-chat-bugs" data-chat="bugs">
      <div class="messages-list" id="msgs-bugs"></div>
      <div class="chat-input-bar">
        <textarea class="chat-textarea" placeholder="Message bug-track..." rows="1" data-channel="bugs"></textarea>
        <button class="send-btn" data-channel="bugs">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- DECISIONS REPO VIEW -->
    <div class="section-view" id="view-decisions">
      <div class="repo-header">
        <div class="repo-title">Decisions Log</div>
        <button class="btn-add" id="btn-propose">+ Propose</button>
      </div>
      <div class="decisions-list" id="decisions-list"></div>
      <!-- Proposal modal -->
      <div class="modal-overlay hidden" id="proposal-modal">
        <div class="modal-sheet">
          <h3>New Proposal</h3>
          <div class="form-row">
            <label class="form-label">Title</label>
            <input class="input-field" id="prop-title" placeholder="e.g. Use React for frontend" style="margin-bottom:0" />
          </div>
          <div class="form-row">
            <label class="form-label">Category</label>
            <select class="form-select" id="prop-cat">
              <option value="Tech Stack">Tech Stack</option>
              <option value="Design">Design</option>
              <option value="Process">Process</option>
              <option value="Infrastructure">Infrastructure</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">Details</label>
            <textarea class="input-field" id="prop-body" rows="3" placeholder="Explain the rationale..." style="border-radius:8px;resize:none;margin-bottom:0"></textarea>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" id="btn-cancel-proposal">Cancel</button>
            <button class="btn-primary" id="btn-submit-proposal" style="flex:1;width:auto">Submit</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ADMIN VIEW -->
    <div class="section-view" id="view-admin">
      <div class="admin-area">
        <div>
          <div class="admin-section-title">Invite Member</div>
          <div class="invite-form" style="margin-top:.75rem">
            <h3>Send Invite</h3>
            <div class="form-row">
              <label class="form-label">Name</label>
              <input class="input-field" id="invite-name" placeholder="Friend's name" style="margin-bottom:0" />
            </div>
            <div class="form-row" style="margin-top:.75rem">
              <label class="form-label">Email</label>
              <input class="input-field" id="invite-email" type="email" placeholder="friend@gmail.com" style="margin-bottom:0" />
            </div>
            <button class="btn-primary" id="btn-invite" style="margin-top:.85rem">Send Invite</button>
            <div id="invite-msg" class="auth-msg"></div>
          </div>
        </div>
        <div>
          <div class="admin-section-title">Members</div>
          <div id="members-list" style="margin-top:.75rem;display:flex;flex-direction:column;gap:.5rem"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" data-nav="chat">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Chat</div>
    </div>
    <div class="nav-item" data-nav="decisions">
      <div class="nav-icon">📌</div>
      <div class="nav-label">Decisions</div>
    </div>
    <div class="nav-item" data-nav="admin" id="nav-admin" style="display:none">
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">Admin</div>
    </div>
  </div>
</div>

<script>
// ── CONFIG — replace with your Supabase project values ──
const SUPABASE_URL = 'https://wykukszumjratluwaaoh.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'sb_publishable_qeMpgBxXiOt11z22faJRMw_bfVq_004';
const ADMIN_EMAIL = 'claudycane@gmail.com'; // your email address

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

let currentUser = null;
let currentProfile = null;
let activeChannel = 'general';
let activeNav = 'chat';
let realtimeSubs = [];

// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await enterApp();
  } else {
    showAuth();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      await enterApp();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      showAuth();
    }
  });
}

// ── AUTH ──
function showAuth() {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

document.getElementById('auth-btn').addEventListener('click', async () => {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) return;
  const btn = document.getElementById('auth-btn');
  const msg = document.getElementById('auth-msg');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: 'https://www.meetonthelevel.app/' }
  });
  btn.disabled = false;
  btn.textContent = 'Send magic link';
  if (error) {
    msg.textContent = error.message;
    msg.className = 'auth-msg error';
  } else {
    msg.textContent = '✓ Check your email for the magic link!';
    msg.className = 'auth-msg success';
  }
});

// ── ENTER APP ──
async function enterApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // Load/create profile
  let { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (!profile) {
    const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
    const { data: np } = await sb.from('profiles').insert({ id: currentUser.id, email: currentUser.email, display_name: name, is_admin: currentUser.email === ADMIN_EMAIL }).select().single();
    profile = np;
  }
  currentProfile = profile;

  // Avatar
  const initials = (currentProfile?.display_name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;

  // Show admin nav if admin
  if (currentProfile?.is_admin) {
    document.getElementById('nav-admin').style.display = 'flex';
  }

  // Load initial chat
  await loadMessages(activeChannel);
  subscribeRealtime();
  loadDecisions();
  if (currentProfile?.is_admin) loadMembers();
  trackOnline();
}

// ── MESSAGES ──
async function loadMessages(channel) {
  const list = document.getElementById(`msgs-${channel}`);
  list.innerHTML = '<div class="date-divider">Loading...</div>';

  const { data: msgs, error } = await sb
    .from('messages')
    .select('*, profiles(display_name)')
    .eq('channel', channel)
    .order('created_at', { ascending: true })
    .limit(50);

  if (error || !msgs) { list.innerHTML = ''; return; }
  list.innerHTML = '';
  if (msgs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><span>No messages yet. Say hi!</span></div>';
    return;
  }
  msgs.forEach(m => renderMessage(m, channel));
  list.scrollTop = list.scrollHeight;
}

function renderMessage(msg, channel) {
  const list = document.getElementById(`msgs-${channel}`);
  const emptyState = list.querySelector('.empty-state');
  if (emptyState) list.innerHTML = '';

  const isMe = msg.user_id === currentUser?.id;
  const name = msg.profiles?.display_name || 'Unknown';
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  const row = document.createElement('div');
  row.className = `msg-row${isMe ? ' mine' : ''}`;
  row.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div>
      ${!isMe ? `<div class="msg-sender">${name}</div>` : ''}
      <div class="msg-bubble">${escapeHtml(msg.content)}</div>
      <div class="msg-meta">${time}</div>
    </div>`;
  list.appendChild(row);
  list.scrollTop = list.scrollHeight;
}

// ── SEND MESSAGE ──
document.querySelectorAll('.send-btn').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.channel));
});
document.querySelectorAll('.chat-textarea').forEach(ta => {
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(ta.dataset.channel);
    }
  });
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  });
});

async function sendMessage(channel) {
  const ta = document.querySelector(`.chat-textarea[data-channel="${channel}"]`);
  const content = ta.value.trim();
  if (!content || !currentUser) return;
  ta.value = '';
  ta.style.height = 'auto';
  await sb.from('messages').insert({ channel, content, user_id: currentUser.id });
}

// ── REALTIME ──
function subscribeRealtime() {
  realtimeSubs.forEach(s => s.unsubscribe());
  realtimeSubs = [];
  ['general','techstack','design','bugs'].forEach(channel => {
    const sub = sb.channel(`messages:${channel}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `channel=eq.${channel}` },
        payload => { if (payload.new.user_id !== currentUser?.id) fetchAndRenderMessage(payload.new, channel); })
      .subscribe();
    realtimeSubs.push(sub);
  });
  const decisionSub = sb.channel('decisions')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'decisions' }, () => loadDecisions())
    .subscribe();
  realtimeSubs.push(decisionSub);
}

async function fetchAndRenderMessage(msg, channel) {
  const { data } = await sb.from('profiles').select('display_name').eq('id', msg.user_id).single();
  msg.profiles = data;
  renderMessage(msg, channel);
}

// ── DECISIONS ──
async function loadDecisions() {
  const list = document.getElementById('decisions-list');
  const { data, error } = await sb.from('decisions').select('*, profiles(display_name)').order('created_at', { ascending: false });
  if (error || !data) return;
  if (data.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📌</div><span>No decisions yet.</span></div>';
    return;
  }
  list.innerHTML = '';
  data.forEach(d => {
    const card = document.createElement('div');
    card.className = `decision-card ${d.status === 'locked' ? 'locked' : 'proposal'}`;
    const tagClass = d.status === 'locked' ? 'tag-locked' : 'tag-proposal';
    const tagLabel = d.status === 'locked' ? '✓ Decided' : '⏳ Proposal';
    const date = new Date(d.created_at).toLocaleDateString();
    const author = d.profiles?.display_name || 'Unknown';
    card.innerHTML = `
      <div>
        <span class="decision-tag ${tagClass}">${tagLabel}</span>
        <span class="decision-tag tag-cat">${escapeHtml(d.category)}</span>
      </div>
      <div class="decision-title">${escapeHtml(d.title)}</div>
      <div class="decision-body">${escapeHtml(d.body)}</div>
      <div class="decision-footer">
        <span>by ${escapeHtml(author)}</span>
        <span>${date}</span>
        ${currentProfile?.is_admin && d.status === 'proposal' ? `<button onclick="lockDecision('${d.id}')" style="background:none;border:none;color:var(--accent);font-family:var(--font-mono);font-size:.65rem;cursor:pointer;padding:0">→ Lock in</button>` : ''}
      </div>`;
    list.appendChild(card);
  });
}

async function lockDecision(id) {
  await sb.from('decisions').update({ status: 'locked' }).eq('id', id);
  loadDecisions();
}

// Proposal modal
document.getElementById('btn-propose').addEventListener('click', () => {
  document.getElementById('proposal-modal').classList.remove('hidden');
});
document.getElementById('btn-cancel-proposal').addEventListener('click', () => {
  document.getElementById('proposal-modal').classList.add('hidden');
});
document.getElementById('btn-submit-proposal').addEventListener('click', async () => {
  const title = document.getElementById('prop-title').value.trim();
  const category = document.getElementById('prop-cat').value;
  const body = document.getElementById('prop-body').value.trim();
  if (!title || !body) return;
  await sb.from('decisions').insert({ title, category, body, user_id: currentUser.id, status: 'proposal' });
  document.getElementById('proposal-modal').classList.add('hidden');
  document.getElementById('prop-title').value = '';
  document.getElementById('prop-body').value = '';
  loadDecisions();
});

// ── ADMIN ──
async function loadMembers() {
  const { data } = await sb.from('profiles').select('*').order('display_name');
  const list = document.getElementById('members-list');
  if (!data) return;
  list.innerHTML = '';
  data.forEach(p => {
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <div class="member-info">
        <div class="member-name">${escapeHtml(p.display_name || p.email)}</div>
        <div class="member-email">${escapeHtml(p.email)}</div>
        <div class="member-status ${p.is_admin ? 'status-active' : 'status-pending'}">${p.is_admin ? '★ admin' : '● member'}</div>
      </div>
      ${!p.is_admin ? `<button class="btn-danger" onclick="removeMember('${p.id}')">Remove</button>` : ''}`;
    list.appendChild(row);
  });
}

async function removeMember(id) {
  if (!confirm('Remove this member?')) return;
  await sb.from('profiles').delete().eq('id', id);
  await sb.auth.admin.deleteUser(id).catch(() => {});
  loadMembers();
}

document.getElementById('btn-invite').addEventListener('click', async () => {
  const name = document.getElementById('invite-name').value.trim();
  const email = document.getElementById('invite-email').value.trim();
  const msg = document.getElementById('invite-msg');
  if (!name || !email) { msg.textContent = 'Name and email required.'; msg.className = 'auth-msg error'; return; }
  const { error } = await sb.auth.admin.inviteUserByEmail(email, {
    data: { full_name: name }
  });
  if (error) {
    msg.textContent = error.message;
    msg.className = 'auth-msg error';
  } else {
    msg.textContent = `✓ Invite sent to ${email}`;
    msg.className = 'auth-msg success';
    document.getElementById('invite-name').value = '';
    document.getElementById('invite-email').value = '';
    setTimeout(() => loadMembers(), 1000);
  }
});

// ── ONLINE PRESENCE ──
async function trackOnline() {
  const room = sb.channel('online-users');
  room.on('presence', { event: 'sync' }, () => {
    const state = room.presenceState();
    const count = Object.keys(state).length;
    document.getElementById('online-count').textContent = `${count} online`;
  }).subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await room.track({ user_id: currentUser.id, name: currentProfile?.display_name });
    }
  });
}

// ── NAVIGATION ──
document.querySelectorAll('[data-nav]').forEach(item => {
  item.addEventListener('click', () => {
    const nav = item.dataset.nav;
    switchNav(nav);
  });
});

function switchNav(nav) {
  activeNav = nav;
  document.querySelectorAll('[data-nav]').forEach(i => i.classList.toggle('active', i.dataset.nav === nav));
  document.getElementById('section-tabs').style.display = nav === 'chat' ? 'flex' : 'none';
  document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));

  if (nav === 'chat') {
    document.getElementById(`view-chat-${activeChannel}`).classList.add('active');
    setHeaderLabel(activeChannel);
  } else if (nav === 'decisions') {
    document.getElementById('view-decisions').classList.add('active');
    setHeaderLabel('Decisions');
  } else if (nav === 'admin') {
    document.getElementById('view-admin').classList.add('active');
    setHeaderLabel('Admin');
    loadMembers();
  }
}

// Channel tabs
document.querySelectorAll('.tab[data-section]').forEach(tab => {
  tab.addEventListener('click', () => {
    const section = tab.dataset.section;
    activeChannel = section;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.section === section));
    document.querySelectorAll('[data-chat]').forEach(v => v.classList.toggle('active', v.dataset.chat === section));
    setHeaderLabel(section);
    loadMessages(section);
  });
});

function setHeaderLabel(section) {
  const labels = { general: 'General', techstack: 'Tech Stack', design: 'Design', bugs: 'Bug Tracker', Decisions: 'Decisions Log', Admin: 'Admin Panel' };
  document.getElementById('header-section-label').textContent = labels[section] || section;
}

// ── UTIL ──
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
